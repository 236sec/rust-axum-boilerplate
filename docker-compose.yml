services:
  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=database_name
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database_name"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://user:password@localhost:5432/database_name
    depends_on:
      database:
        condition: service_healthy
volumes:
  db_data:
networks:
  app-network:
    driver: bridge
